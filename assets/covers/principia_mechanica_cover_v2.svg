<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 960" width="680" height="960">
  <defs>
    <linearGradient id="parchblue" x1="0%" y1="0%" x2="8%" y2="100%">
      <stop offset="0%" stop-color="#EAE5D8"/>
      <stop offset="100%" stop-color="#D8D0C0"/>
    </linearGradient>
    <linearGradient id="goldprin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F0E"/>
    </linearGradient>
    <radialGradient id="vortexglow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#4A6B8A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4A6B8A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="680" height="960" fill="url(#parchblue)"/>
  <!-- Blue-grey ink wash -->
  <rect width="680" height="960" fill="#4A6B8A" opacity="0.05"/>
  <!-- Vortex glow -->
  <ellipse cx="340" cy="520" rx="220" ry="260" fill="url(#vortexglow)"/>
  <!-- ═══ VORTEX SPIRAL BECOMING GEARS ═══ -->
  <g transform="translate(340,510)" stroke="#4A6B8A" fill="none" opacity="0.72">
    <!-- Outer spiral arms (water) -->
    <path d="M 0,0 C 40,-60 120,-80 160,-40 C 200,0 180,80 120,100 C 60,120 -40,80 -80,20 C -120,-40 -80,-130 0,-150" 
          stroke-width="1.8" stroke="#5C8AA8" opacity="0.6"/>
    <path d="M 0,0 C -35,55 -110,75 -145,38 C -180,0 -165,-70 -110,-92 C -55,-114 38,-75 72,-18 C 106,40 70,118 0,138"
          stroke-width="1.2" stroke="#4A6B8A" opacity="0.45"/>
    <!-- Vortex becoming gear at centre -->
    <circle r="60" stroke-width="2" stroke="#3D5570"/>
    <circle r="44" stroke-width="1" stroke="#4A6B8A" opacity="0.5"/>
    <circle r="14" stroke-width="1.5" stroke="#3D5570"/>
    <circle r="5" fill="#3D5570"/>
    <!-- Gear teeth emerging from vortex -->
    <g stroke="#3D5570" stroke-width="1.8">
      <rect x="-6" y="-67" width="12" height="16" rx="1"/>
      <rect x="-6" y="51" width="12" height="16" rx="1"/>
      <rect x="-67" y="-6" width="16" height="12" rx="1"/>
      <rect x="51" y="-6" width="16" height="12" rx="1"/>
      <g transform="rotate(45)"><rect x="-6" y="-67" width="12" height="16" rx="1"/></g>
      <g transform="rotate(90)"><rect x="-6" y="-67" width="12" height="16" rx="1"/></g>
      <g transform="rotate(135)"><rect x="-6" y="-67" width="12" height="16" rx="1"/></g>
      <g transform="rotate(225)"><rect x="-6" y="-67" width="12" height="16" rx="1"/></g>
      <g transform="rotate(270)"><rect x="-6" y="-67" width="12" height="16" rx="1"/></g>
      <g transform="rotate(315)"><rect x="-6" y="-67" width="12" height="16" rx="1"/></g>
    </g>
    <!-- Spokes -->
    <g stroke="#3D5570" stroke-width="1.2" opacity="0.7">
      <line x1="0" y1="-14" x2="0" y2="-44"/>
      <line x1="0" y1="14" x2="0" y2="44"/>
      <line x1="-14" y1="0" x2="-44" y2="0"/>
      <line x1="14" y1="0" x2="44" y2="0"/>
    </g>
  </g>
  <!-- Orrery rings — outer planetary orbits -->
  <g transform="translate(340,510)" stroke="#8DAFC0" fill="none" opacity="0.3">
    <ellipse rx="200" ry="200" stroke-dasharray="4,8" stroke-width="0.8"/>
    <ellipse rx="250" ry="100" stroke-dasharray="3,6" stroke-width="0.6" transform="rotate(-25)"/>
    <circle r="6" cx="0" cy="-200" fill="#8DAFC0" opacity="0.5"/>
    <circle r="4" cx="177" cy="-177" fill="#8DAFC0" opacity="0.4"/>
    <circle r="5" cx="-195" cy="60" fill="#8DAFC0" opacity="0.4"/>
  </g>
  <!-- Anatomical vessel overlay — merging with pipes -->
  <g opacity="0.18" stroke="#5C3D1E" stroke-width="1.2" fill="none">
    <path d="M 200,330 C 240,340 270,380 260,430 C 250,480 210,500 200,550"/>
    <path d="M 480,350 C 440,360 410,400 420,450 C 430,500 468,520 470,570"/>
    <path d="M 200,550 C 220,570 260,565 280,590"/>
    <path d="M 470,570 C 450,590 420,585 400,610"/>
  </g>
  <!-- Flow equations — margin annotations -->
  <g opacity="0.28" stroke="#4A6B8A" stroke-width="0.8">
    <line x1="42" y1="300" x2="155" y2="300"/>
    <line x1="42" y1="316" x2="148" y2="316"/>
    <line x1="42" y1="332" x2="158" y2="332"/>
    <line x1="42" y1="348" x2="144" y2="348"/>
    <line x1="530" y1="380" x2="638" y2="380"/>
    <line x1="530" y1="396" x2="630" y2="396"/>
    <line x1="530" y1="412" x2="636" y2="412"/>
  </g>
  <!-- ═══ GOLD TITLE BAR ═══ -->
  <rect x="0" y="0" width="680" height="148" fill="url(#goldprin)"/>
  <rect x="0" y="144" width="680" height="4" fill="#3A2808"/>
  <text x="340" y="50" font-family="Georgia, serif" font-size="22" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="4">PRINCIPIA</text>
  <text x="340" y="84" font-family="Georgia, serif" font-size="22" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="4">OMNIUM</text>
  <text x="340" y="112" font-family="Georgia, serif" font-size="12" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="3">UNIVERSALE</text>
  <line x1="60" y1="124" x2="620" y2="124" stroke="#C9A84C" stroke-width="0.8" opacity="0.55"/>
  <text x="340" y="138" font-family="Georgia, serif" font-size="9" font-style="italic"
        fill="#D4B870" text-anchor="middle" letter-spacing="1">Leonardo's Architecture of Reality · Madrid Codex II</text>
  <!-- ═══ BOTTOM BAR ═══ -->
  <rect x="0" y="900" width="680" height="60" fill="#1C1408" opacity="0.9"/>
  <line x1="0" y1="900" x2="680" y2="900" stroke="#C9A84C" stroke-width="1"/>
  <text x="340" y="926" font-family="Georgia, serif" font-size="11"
        fill="#C9A84C" text-anchor="middle" letter-spacing="2">RICHARD STEVEN VALLANCE (DA VALENCA)</text>
  <text x="340" y="948" font-family="Georgia, serif" font-size="9"
        fill="#A08040" text-anchor="middle" letter-spacing="1">The People Focused Group · Doncaster, UK · 2026</text>
</svg>