<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 960" width="680" height="960">
  <defs>
    <radialGradient id="cosmicground" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#E8EAF4"/>
      <stop offset="50%" stop-color="#D8DCE8"/>
      <stop offset="100%" stop-color="#C4C8D8"/>
    </radialGradient>
    <radialGradient id="vortexglow" cx="50%" cy="52%" r="42%">
      <stop offset="0%" stop-color="#4A6B8A" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#4A6B8A" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4A6B8A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldpanel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4AD52"/>
      <stop offset="40%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#4A3008"/>
    </linearGradient>
    <linearGradient id="bottompanel2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1C2B3A"/>
      <stop offset="100%" stop-color="#0A1520"/>
    </linearGradient>
  </defs>

  <!-- Cosmic parchment ground -->
  <rect width="680" height="960" fill="url(#cosmicground)"/>
  <rect width="680" height="960" fill="#4A6B8A" opacity="0.06"/>

  <!-- Vortex glow field -->
  <ellipse cx="340" cy="500" rx="240" ry="280" fill="url(#vortexglow)"/>

  <!-- ═══ OUTER ORRERY RINGS ═══ -->
  <g transform="translate(340,500)" stroke="#8DAFC0" fill="none" opacity="0.28">
    <ellipse rx="260" ry="260" stroke-dasharray="5,10" stroke-width="0.8"/>
    <ellipse rx="220" ry="90" stroke-dasharray="4,8" stroke-width="0.6" transform="rotate(-18)"/>
    <ellipse rx="180" ry="70" stroke-dasharray="3,6" stroke-width="0.5" transform="rotate(12)"/>
    <!-- Planet marks -->
    <circle cx="0" cy="-260" r="7" fill="#8DAFC0" opacity="0.6"/>
    <circle cx="218" cy="-80" r="5" fill="#8DAFC0" opacity="0.5"/>
    <circle cx="-195" cy="68" r="6" fill="#8DAFC0" opacity="0.4"/>
    <circle cx="90" cy="255" r="4" fill="#8DAFC0" opacity="0.4"/>
  </g>

  <!-- ═══ VORTEX SPIRAL — centre ═══ -->
  <g transform="translate(340,500)" opacity="0.7">
    <!-- Main spiral arms (water becoming gears) -->
    <path d="M 0,0 C 55,-80 155,-95 185,-42 C 215,10 188,100 124,118 C 60,136 -52,90 -82,18 C -112,-54 -68,-158 0,-175"
          fill="none" stroke="#4A7A9B" stroke-width="2.2" opacity="0.65"/>
    <path d="M 0,0 C -48,68 -138,82 -165,35 C -192,-12 -170,-90 -112,-110 C -54,-130 44,-88 72,-18 C 100,52 60,140 0,158"
          fill="none" stroke="#3A6080" stroke-width="1.5" opacity="0.45"/>
    <path d="M 0,0 C 30,-42 85,-52 100,-22 C 115,8 100,55 66,64"
          fill="none" stroke="#4A7A9B" stroke-width="1" opacity="0.35"/>

    <!-- Vortex becoming gear at centre -->
    <circle r="72" fill="none" stroke="#3D5F7A" stroke-width="2.2"/>
    <circle r="56" fill="none" stroke="#4A7A9B" stroke-width="0.8" opacity="0.5"/>
    <circle r="18" fill="none" stroke="#3D5F7A" stroke-width="1.8"/>
    <circle r="6" fill="#3D5F7A"/>

    <!-- Gear teeth at centre -->
    <g stroke="#3D5F7A" stroke-width="2" fill="none">
      <rect x="-7" y="-80" width="14" height="18" rx="1"/>
      <rect x="-7" y="62" width="14" height="18" rx="1"/>
      <rect x="-80" y="-7" width="18" height="14" rx="1"/>
      <rect x="62" y="-7" width="18" height="14" rx="1"/>
      <g transform="rotate(45)"><rect x="-7" y="-80" width="14" height="18" rx="1"/></g>
      <g transform="rotate(90)"><rect x="-7" y="-80" width="14" height="18" rx="1"/></g>
      <g transform="rotate(135)"><rect x="-7" y="-80" width="14" height="18" rx="1"/></g>
      <g transform="rotate(225)"><rect x="-7" y="-80" width="14" height="18" rx="1"/></g>
      <g transform="rotate(270)"><rect x="-7" y="-80" width="14" height="18" rx="1"/></g>
      <g transform="rotate(315)"><rect x="-7" y="-80" width="14" height="18" rx="1"/></g>
    </g>
    <!-- Spokes -->
    <g stroke="#3D5F7A" stroke-width="1.5" opacity="0.7">
      <line x1="0" y1="-18" x2="0" y2="-56"/>
      <line x1="0" y1="18" x2="0" y2="56"/>
      <line x1="-18" y1="0" x2="-56" y2="0"/>
      <line x1="18" y1="0" x2="56" y2="0"/>
    </g>
  </g>

  <!-- ═══ ANATOMICAL VESSELS merging with pipes ═══ -->
  <g opacity="0.16" stroke="#5C3D1E" stroke-width="1.2" fill="none">
    <path d="M 155,295 C 200,310 225,365 218,420 C 211,475 175,500 168,560"/>
    <path d="M 525,315 C 480,330 455,388 462,444 C 469,500 503,525 505,584"/>
    <path d="M 168,560 C 190,582 225,578 248,608"/>
    <path d="M 505,584 C 483,605 450,600 428,630"/>
  </g>

  <!-- ═══ FOUR ELEMENTS SYMBOLS — corners ═══ -->
  <!-- Earth (bottom left) -->
  <g transform="translate(68,800)" opacity="0.42" stroke="#5C3D1E" fill="none" stroke-width="1.2">
    <polygon points="0,-22 -19,11 19,11"/>
    <line x1="0" y1="-22" x2="0" y2="-30"/>
    <line x1="-19" y1="11" x2="-26" y2="15"/>
    <line x1="19" y1="11" x2="26" y2="15"/>
    <text x="0" y="28" font-family="Georgia" font-size="8" fill="#5C3D1E" text-anchor="middle" font-style="italic">terra</text>
  </g>
  <!-- Water (bottom right) -->
  <g transform="translate(612,800)" opacity="0.42" stroke="#4A6B8A" fill="none" stroke-width="1.2">
    <polygon points="0,22 -19,-11 19,-11"/>
    <line x1="0" y1="22" x2="0" y2="30"/>
    <text x="0" y="42" font-family="Georgia" font-size="8" fill="#4A6B8A" text-anchor="middle" font-style="italic">aqua</text>
  </g>
  <!-- Fire (upper right) -->
  <g transform="translate(612,215)" opacity="0.42" stroke="#8B3B1E" fill="none" stroke-width="1.2">
    <polygon points="0,-22 -19,11 19,11"/>
    <polygon points="0,-8 -8,6 8,6" fill="#8B3B1E" opacity="0.3"/>
    <text x="0" y="28" font-family="Georgia" font-size="8" fill="#8B3B1E" text-anchor="middle" font-style="italic">ignis</text>
  </g>
  <!-- Air (upper left) -->
  <g transform="translate(68,215)" opacity="0.42" stroke="#4A6B8A" fill="none" stroke-width="1.2">
    <polygon points="0,-22 -19,11 19,11"/>
    <line x1="-19" y1="11" x2="19" y2="11"/>
    <text x="0" y="28" font-family="Georgia" font-size="8" fill="#4A6B8A" text-anchor="middle" font-style="italic">aer</text>
  </g>

  <!-- Flow equation lines — margins -->
  <g opacity="0.24" stroke="#4A6B8A" stroke-width="0.8">
    <line x1="42" y1="310" x2="165" y2="310"/>
    <line x1="42" y1="325" x2="158" y2="325"/>
    <line x1="42" y1="340" x2="162" y2="340"/>
    <line x1="42" y1="355" x2="152" y2="355"/>
    <line x1="515" y1="395" x2="638" y2="395"/>
    <line x1="515" y1="410" x2="630" y2="410"/>
    <line x1="515" y1="425" x2="635" y2="425"/>
    <line x1="515" y1="440" x2="625" y2="440"/>
  </g>

  <!-- BNE folio ref -->
  <text x="625" y="800" font-family="Georgia,serif" font-size="7" fill="#4A6B8A" opacity="0.32" text-anchor="end" font-style="italic">BNE MS.8936</text>

  <!-- ═══ GOLD TITLE PANEL ═══ -->
  <rect x="0" y="0" width="680" height="160" fill="url(#goldpanel2)"/>
  <rect x="0" y="156" width="680" height="4" fill="#2A1808"/>

  <text x="340" y="38" font-family="Georgia,serif" font-size="13" font-weight="bold"
        fill="#EDD8A0" text-anchor="middle" letter-spacing="4">LEONARDO DA VINCI'S</text>
  <text x="340" y="74" font-family="Georgia,serif" font-size="30" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="5">PRINCIPIA</text>
  <text x="340" y="106" font-family="Georgia,serif" font-size="24" font-weight="bold"
        fill="#FAF0DC" text-anchor="middle" letter-spacing="5">OMNIUM</text>
  <text x="340" y="128" font-family="Georgia,serif" font-size="14" font-weight="bold"
        fill="#EDD8A0" text-anchor="middle" letter-spacing="3">UNIVERSALE</text>
  <line x1="55" y1="138" x2="625" y2="138" stroke="#C9A84C" stroke-width="0.7" opacity="0.5"/>
  <text x="340" y="152" font-family="Georgia,serif" font-size="8" font-style="italic"
        fill="#C4A050" text-anchor="middle" letter-spacing="1">Earth · Air · Fire · Water · and the Fifth Element</text>

  <!-- ═══ BOTTOM BAR ═══ -->
  <rect x="0" y="900" width="680" height="60" fill="url(#bottompanel2)"/>
  <line x1="0" y1="900" x2="680" y2="900" stroke="#C9A84C" stroke-width="1.2"/>
  <text x="340" y="924" font-family="Georgia,serif" font-size="12" font-weight="bold"
        fill="#C9A84C" text-anchor="middle" letter-spacing="2.5">RICHARD STEVEN VALLANCE</text>
  <text x="340" y="944" font-family="Georgia,serif" font-size="9"
        fill="#6B5020" text-anchor="middle" letter-spacing="1">Da Valenca — Leonardo Project  ·  United Kingdom  ·  2026</text>

  <!-- Imprint -->
  <text x="525" y="870" font-family="Georgia,serif" font-size="8" fill="#8B6914" text-anchor="middle" opacity="0.5">Da Valenca Archive</text>
  <text x="525" y="881" font-family="Georgia,serif" font-size="7" fill="#8B6914" text-anchor="middle" opacity="0.4">Pre-publication edition</text>
</svg>